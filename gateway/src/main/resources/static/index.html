<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Choice - Выбор фильма вместе</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* === ГЛАВНЫЙ ЭКРАН === */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === ЭКРАН ПРИСОЕДИНЕНИЯ === */
        .welcome-screen {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .welcome-screen h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-screen p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
        }

        .success {
            color: #27ae60;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
        }

        .copy-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .copy-section p {
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .link-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .link-box input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .copy-btn {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        /* === ЭКРАН ОЖИДАНИЯ === */
        .waiting-screen {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .waiting-screen h2 {
            color: #333;
            margin-bottom: 30px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .waiting-screen p {
            color: #666;
        }

        /* === ЭКРАН ГОЛОСОВАНИЯ === */
        .voting-screen {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .movie-poster {
            width: 100%;
            max-width: 300px;
            height: 450px;
            background: #f0f0f0;
            border-radius: 15px;
            margin: 30px auto;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-title {
            font-size: 24px;
            color: #333;
            margin: 20px 0;
            font-weight: 600;
        }

        .voting-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .vote-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .vote-btn.yes {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .vote-btn.yes:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.4);
        }

        .vote-btn.no {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .vote-btn.no:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(235, 51, 73, 0.4);
        }

        .vote-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .vote-btn.voted {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-indicator {
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }

        .participant-status {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .participant {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .participant-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .participant-status-text {
            font-size: 12px;
            color: #666;
        }

        .status-icon {
            font-size: 18px;
        }

        /* === ЭКРАН СОВПАДЕНИЯ === */
        .match-screen {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .match-animation {
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-180deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            animation: confettifall 3s ease-in forwards;
        }

        @keyframes confettifall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .match-poster {
            width: 100%;
            max-width: 250px;
            height: 375px;
            background: #f0f0f0;
            border-radius: 15px;
            margin: 30px auto;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 4px solid #11998e;
        }

        .match-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-title {
            font-size: 36px;
            margin: 20px 0;
            color: #11998e;
            font-weight: 700;
        }

        .celebration {
            font-size: 60px;
            animation: bounce 0.6s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .match-actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .exit-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #999;
            color: white;
            transition: all 0.3s;
        }

        .exit-btn:hover {
            background: #777;
        }

        .next-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        /* === МОБИЛЬНЫЙ ДИЗАЙН === */
        @media (max-width: 480px) {
            .welcome-screen,
            .waiting-screen,
            .voting-screen,
            .match-screen {
                padding: 25px 20px;
                border-radius: 15px;
            }

            .welcome-screen h1 {
                font-size: 24px;
            }

            .movie-title {
                font-size: 20px;
            }

            .match-title {
                font-size: 28px;
            }

            .vote-btn {
                padding: 14px;
                font-size: 16px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ЭКРАН ПРИСОЕДИНЕНИЯ -->
        <div id="welcomeScreen" class="screen welcome-screen active">
            <div class="logo">🎬</div>
            <h1>The Best Choice</h1>
            <p>Выбирайте фильм вместе с друзьями</p>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('join')">Присоединиться</button>
                <button class="tab-btn" onclick="switchTab('create')">Создать сессию</button>
            </div>

            <!-- TAB: ПРИСОЕДИНИТЬСЯ -->
            <div id="joinTab" class="tab-content active">
                <div class="form-group">
                    <label>Введите ссылку сессии:</label>
                    <input
                        type="text"
                        id="sessionLink"
                        placeholder="https://localhost:8080/?session=..."
                        autocomplete="off"
                    />
                </div>
                <button class="btn btn-primary" onclick="joinSession()">Присоединиться</button>
                <div id="joinError" class="error hidden"></div>
            </div>

            <!-- TAB: СОЗДАТЬ СЕССИЮ -->
            <div id="createTab" class="tab-content">
                <p style="color: #666; margin-bottom: 20px;">Создайте новую сессию и пригласите друзей!</p>
                <button class="btn btn-primary" onclick="createSession()">Создать сессию</button>
                
                <div id="createError" class="error hidden"></div>
            </div>
        </div>

        <!-- ЭКРАН ОЖИДАНИЯ ВТОРОГО УЧАСТНИКА -->
        <div id="waitingScreen" class="screen waiting-screen">
            <h2>Ожидание второго участника...</h2>
            <div class="spinner"></div>
            <p id="waitingCode" style="font-size: 16px; color: #333; margin-bottom: 20px;">Код сессии: <strong></strong></p>
            <div class="copy-section">
                <p>Поделитесь этой ссылкой с другом:</p>
                <div class="link-box">
                    <input type="text" id="inviteLink" readonly />
                    <button class="copy-btn" onclick="copyToClipboard()">Копировать</button>
                </div>
            </div>
            <button class="btn btn-primary" style="margin-top: 30px;" onclick="goBackToWelcome()">Вернуться на главную</button>
        </div>

        <!-- ЭКРАН ГОЛОСОВАНИЯ -->
        <div id="votingScreen" class="screen voting-screen">
            <h2 style="color: #667eea; margin-bottom: 10px;">Голосование</h2>
            <p style="color: #999; margin-bottom: 20px;" id="movieCounter">Фильм 1 из 20</p>

            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Постер фильма" />
            </div>

            <div class="movie-title" id="movieTitle">Загрузка...</div>

            <div class="voting-buttons">
                <button class="vote-btn yes" id="yesBtn" onclick="vote('LIKE')">👍 Да</button>
                <button class="vote-btn no" id="noBtn" onclick="vote('DISLIKE')">👎 Нет</button>
            </div>

            <div class="participant-status">
                <div class="participant">
                    <div class="participant-avatar">1</div>
                    <div>
                        <div class="participant-status-text">Вы</div>
                        <div class="status-icon" id="participant1Status">⏳</div>
                    </div>
                </div>
                <div class="participant">
                    <div class="participant-avatar">2</div>
                    <div>
                        <div class="participant-status-text">Друг</div>
                        <div class="status-icon" id="participant2Status">⏳</div>
                    </div>
                </div>
            </div>

            <button class="exit-btn" style="margin-top: 30px;" onclick="exitSession()">Выход</button>
        </div>

        <!-- ЭКРАН СОВПАДЕНИЯ -->
        <div id="matchScreen" class="screen match-screen">
            <div class="celebration match-animation">🎉</div>

            <div class="match-poster">
                <img id="matchPoster" src="" alt="Постер фильма" />
            </div>

            <div class="match-title" id="matchTitle">Совпадение!</div>
            <p style="color: #666; margin: 20px 0;" id="matchSubtitle">Вы оба выбрали этот фильм!</p>

            <div class="match-actions">
                <button class="next-btn" onclick="nextMatch()">Дальше</button>
                <button class="exit-btn" onclick="exitSession()">Выход</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <script>
        (function() {
            const isLocalhost = window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1';

            if (isLocalhost) {

                window.BACKEND_SESSION_URL = 'http://localhost:8081/api/sessions';
                window.BACKEND_VOTING_URL = 'http://localhost:8082/api/voting';
                window.BACKEND_WS_URL = 'http://localhost:8082/ws';
            } else {

                const protocol = window.location.protocol;

                const host = window.location.host;
                const votingHost = host.replace('thebestchoice-gateway', 'thebestchoice-voting')
                    .replace('gateway', 'voting');

                window.BACKEND_WS_URL = protocol + '//' + votingHost + '/ws';
            }

            console.log('Backend Configuration:');
            console.log('WebSocket URL:', window.BACKEND_WS_URL);
        })();
    </script>
    
    <script src="/js/app.js"></script>
</body>
</html>
