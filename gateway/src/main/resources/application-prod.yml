server:
  port: ${PORT:8080}

app:
  warmup:
    enabled: ${WARMUP_ENABLED:true}
    startup-enabled: ${WARMUP_STARTUP_ENABLED:true}
    timeout: ${WARMUP_TIMEOUT:180s}
    retry-delay: ${WARMUP_RETRY_DELAY:5s}

spring:
  cloud:
    gateway:
      routes:
        - id: session-service
          uri: ${SESSION_SERVICE_URL}
          predicates:
            - Path=/api/sessions/**
          filters:
            - StripPrefix=0
            - AddResponseHeader=X-Gateway-Handled, true

        - id: voting-service-rest
          uri: ${VOTING_SERVICE_URL}
          predicates:
            - Path=/api/voting/**
          filters:
            - StripPrefix=0
            - AddResponseHeader=X-Gateway-Handled, true

        - id: voting-service-ws
          uri: ${VOTING_WS_URL:${VOTING_SERVICE_URL}}
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
